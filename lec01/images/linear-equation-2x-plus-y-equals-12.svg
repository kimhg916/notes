<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">The line 2x + y = 12 in the xy-plane</title>
  <desc id="desc">A coordinate plane showing the line through (0,12) and (6,0), representing all solutions to 2x plus y equals 12.</desc>
  <rect width="640" height="420" fill="#ffffff"/>
  <rect x="82" y="40" width="498" height="300" fill="#f8fafc" stroke="#d8dee8"/>

  <g stroke="#e4e9f1" stroke-width="1">
    <line x1="82" y1="318.6" x2="580" y2="318.6"/>
    <line x1="82" y1="297.1" x2="580" y2="297.1"/>
    <line x1="82" y1="275.7" x2="580" y2="275.7"/>
    <line x1="82" y1="254.3" x2="580" y2="254.3"/>
    <line x1="82" y1="232.9" x2="580" y2="232.9"/>
    <line x1="82" y1="211.4" x2="580" y2="211.4"/>
    <line x1="82" y1="190" x2="580" y2="190"/>
    <line x1="82" y1="168.6" x2="580" y2="168.6"/>
    <line x1="82" y1="147.1" x2="580" y2="147.1"/>
    <line x1="82" y1="125.7" x2="580" y2="125.7"/>
    <line x1="82" y1="104.3" x2="580" y2="104.3"/>
    <line x1="82" y1="82.9" x2="580" y2="82.9"/>
    <line x1="153.1" y1="40" x2="153.1" y2="340"/>
    <line x1="224.3" y1="40" x2="224.3" y2="340"/>
    <line x1="295.4" y1="40" x2="295.4" y2="340"/>
    <line x1="366.6" y1="40" x2="366.6" y2="340"/>
    <line x1="437.7" y1="40" x2="437.7" y2="340"/>
    <line x1="508.9" y1="40" x2="508.9" y2="340"/>
  </g>

  <g stroke="#172033" stroke-width="2" fill="none">
    <line x1="82" y1="340" x2="596" y2="340"/>
    <line x1="82" y1="340" x2="82" y2="24"/>
    <path d="M596 340 L586 335 L586 345 Z" fill="#172033"/>
    <path d="M82 24 L77 34 L87 34 Z" fill="#172033"/>
  </g>

  <line x1="82" y1="82.9" x2="508.9" y2="340" stroke="#0f766e" stroke-width="4"/>
