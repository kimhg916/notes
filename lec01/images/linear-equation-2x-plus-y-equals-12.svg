    <text x="235" y="155" font-size="14" fill="#92400e">(2, 8)</text>
    <text x="378" y="242" font-size="14" fill="#92400e">(4, 4)</text>
    <text x="94" y="104" font-size="14" fill="#0f766e">(0, 12)</text>
