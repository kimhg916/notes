  <circle cx="508.9" cy="340" r="5" fill="#0f766e"/>
  <circle cx="224.3" cy="168.6" r="5" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
  <circle cx="366.6" cy="254.3" r="5" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif" fill="#172033">
    <text x="601" y="365" font-size="18">x</text>
    <text x="55" y="28" font-size="18">y</text>
    <text x="72" y="365" font-size="14">0</text>
    <text x="218" y="365" font-size="14">2</text>
    <text x="360" y="365" font-size="14">4</text>
    <text x="502" y="365" font-size="14">6</text>
    <text x="48" y="259" font-size="14">4</text>
    <text x="48" y="173" font-size="14">8</text>
